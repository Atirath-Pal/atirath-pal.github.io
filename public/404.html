<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Atirath Pal Portfolio</title>
    <script type="text/javascript">
      // This script takes the current URL and redirects to index.html 
      // with the path as a query string so React Router can find it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    </body>
</html>
